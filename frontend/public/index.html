<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Directory - Login</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="container">
    <div class="login-card">
      <h1>📁 PDF Directory</h1>
      <p class="subtitle">Enter password to access</p>
      
      <form hx-post="https://6thward-fh-api.theburtonforge.com/api/auth" 
            hx-target="#message"
            hx-indicator="#loading">
        <div class="form-group">
          <input type="password" 
                 name="password" 
                 placeholder="Password" 
                 required
                 autofocus
                 class="password-input">
        </div>
        
        <button type="submit" class="btn-primary">
          <span>Login</span>
          <span id="loading" class="htmx-indicator">Logging in...</span>
        </button>
      </form>
      
      <div id="message" class="message"></div>
    </div>
  </div>
  
  <script type="module" src="/dist/auth.js"></script>
</body>
</html>
